                { id: 33, text: "En una escuela con acceso limitado a internet, el docente desea integrar la tecnología para fortalecer el pensamiento crítico y la resolución de problemas. Sin embargo, identifica que varios recursos requieren conectividad permanente y acceso constante a dispositivos, condiciones que no están garantizadas para todo el grupo. Además, el acceso es desigual e intermitente. El docente busca aprovechar la tecnología disponible sin depender de internet en tiempo real, manteniendo la indagación, el análisis y la toma de decisiones. ¿Qué estrategia resultaría más adecuada para alcanzar estos propósitos en este contexto?", options: ["Desarrollar una estrategia centrada en la incorporación de la tecnología como recurso complementario en la planificación, articulándola con tareas estructuradas y secuencias didácticas que promuevan el desarrollo de habilidades de pensamiento.", "Desarrollar una estrategia centrada en la integración de recursos tecnológicos accesibles sin conexión permanente, articulados con situaciones problemáticas del entorno que promuevan la exploración, la formulación de hipótesis, la argumentación y la construcción de soluciones fundamentadas, favoreciendo el desarrollo de competencias.", "Desarrollar una estrategia centrada en el uso de dispositivos sin conexión para la organización y presentación de información disciplinar, integrando recursos visuales, como diapositivas, esquemas y explicaciones estructuradas.", "Desarrollar una estrategia centrada en la sustitución de la mediación presencial por recursos digitales asincrónicos, como videos y presentaciones en línea."], correct: 1, justification: "La respuesta correcta es la B porque integra recursos tecnológicos accesibles sin conexión permanente, articulados con situaciones problemáticas que promueven exploración, argumentación y construcción de soluciones. Mantiene el pensamiento crítico sin depender de internet. A usa tecnología como complemento sin articulación con situaciones problemáticas; C solo presenta información; D requiere acceso a internet." },
                { id: 34, text: "En Lengua Española del segundo ciclo, el docente propone actividades de producción escrita y análisis de textos en equipos para fortalecer la argumentación y la construcción colectiva de ideas. Sin embargo, observa que algunos estudiantes evitan participar debido a conflictos interpersonales o porque consideran las tareas poco significativas. Esto genera participación desigual, baja corresponsabilidad y dificultades para sostener diálogos constructivos, afectando tanto la calidad de los productos como el clima de aula. Además, las dinámicas colaborativas carecen de orientaciones explícitas para la interacción y la gestión de desacuerdos. ¿Qué estrategia pedagógica permitiría fortalecer la participación, la convivencia y la colaboración efectiva?", options: ["Implementar estrategias de aprendizaje cooperativo centradas en la estructuración de dinámicas colaborativas y en la definición de normas de trabajo en equipo, incorporando orientaciones para la participación, la autorregulación y el seguimiento de las tareas, así como espacios de revisión de los productos elaborados.", "Implementar estrategias de aprendizaje cooperativo centradas en la enseñanza de habilidades de interacción, la estructuración de dinámicas colaborativas y la reflexión sobre el trabajo en equipo, integrando normas compartidas, roles interdependientes y espacios de evaluación conjunta que favorezcan la participación, la corresponsabilidad y la construcción de productos colectivos de mayor calidad.", "Implementar estrategias de organización del trabajo colaborativo incorporando roles y pautas de interacción en los equipos, junto con momentos de revisión grupal que permitan mejorar la coordinación y la participación.", "Implementar estrategias de mediación pedagógica centradas en la adecuación de las tareas colaborativas según los intereses y niveles del grupo."], correct: 1, justification: "La respuesta correcta es la B porque enseña explícitamente habilidades de interacción, estructura dinámicas colaborativas con normas compartidas, roles interdependientes y evaluación conjunta. Aborda todos los problemas identificados: conflictos, baja corresponsabilidad y falta de orientaciones. A y C son parciales; D adapta las tareas sin abordar las dinámicas de interacción." },
                { id: 35, text: "En segundo grado, el docente trabaja con estudiantes que hablan distintas variedades lingüísticas y otros que presentan dificultades para comprender términos académicos. Al analizar su práctica, identifica que el lenguaje utilizado en textos y consignas puede convertirse en una barrera para el aprendizaje. Busca implementar estrategias que faciliten la comprensión del lenguaje académico sin simplificar excesivamente los contenidos ni desvalorizar las formas de habla de los estudiantes. Su propósito es garantizar el acceso al currículo y promover la participación de todo el grupo. ¿Qué estrategia didáctica resultaría más adecuada para favorecer la comprensión en un contexto de diversidad lingüística?", options: ["Priorizar un registro cercano y cotidiano en las interacciones de aula, reduciendo la densidad conceptual del discurso para asegurar que todos los estudiantes participen con mayor comodidad.", "Sostener el uso del lenguaje disciplinar propio del área, limitando simplificaciones excesivas, con la intención de favorecer la familiarización gradual con los términos técnicos.", "Intervenir de forma frecuente en las participaciones orales para ajustar expresiones al registro académico esperado.", "Alternar el uso del lenguaje académico con reformulaciones estratégicas, ejemplos contextualizados y apoyos semánticos que permitan construir significado sin sustituir el vocabulario propio de la disciplina."], correct: 3, justification: "La respuesta correcta es la D porque alterna el lenguaje académico con reformulaciones y apoyos semánticos, construyendo significado sin sustituir el vocabulario disciplinar. Garantiza acceso sin simplificar ni desvalorizar las formas de habla. A reduce la densidad conceptual; B insiste en el lenguaje técnico sin apoyos; C corrige las expresiones, lo que puede desvalorizar las variedades lingüísticas." },
                { id: 36, text: "Al iniciar una nueva unidad didáctica, el docente necesita conocer con mayor precisión los saberes previos, las habilidades y las posibles concepciones alternativas de sus estudiantes respecto de los contenidos que se abordarán. Reconoce que el grupo es heterogéneo y que avanzar sin esta información podría generar dificultades para de nuevos conceptos y ampliar las brechas de aprendizaje. Su propósito es recopilar evidencias que orienten las decisiones pedagógicas. ¿Qué tipo de evaluación resultaría más pertinente para orientar la planificación?", options: ["Evaluación sumativa, ya que busca medir el rendimiento final de los estudiantes y asignar calificaciones.", "Evaluación diagnóstica, aplicada durante el desarrollo de la unidad para identificar dificultades emergentes y ajustar las actividades, con el fin de mejorar los resultados finales del estudiantado.", "Evaluación diagnóstica, ya que permite identificar fortalezas y áreas de oportunidad del estudiantado antes de iniciar la enseñanza de nuevos contenidos.", "Evaluación formativa inicial, orientada a recoger información sobre los desempeños previos y ajustar las actividades durante las primeras etapas de la unidad."], correct: 2, justification: "La respuesta correcta es la C porque la evaluación diagnóstica identifica fortalezas y áreas de oportunidad antes de iniciar la enseñanza de nuevos contenidos. Es el tipo de evaluación diseñado exactamente para este propósito. A es sumativa, no diagnóstica; B aplica la evaluación durante la unidad, no antes; D describe una evaluación formativa inicial que no es lo mismo que diagnóstica." },
                { id: 37, text: "Luego de evaluar el desempeño en matemáticas mediante diversas evidencias, el docente necesita comunicar a estudiantes y familias el nivel de logro alcanzado. Sin embargo, reconoce que las calificaciones numéricas no reflejan adecuadamente qué sabe hacer cada estudiante, cuáles son sus dificultades ni qué pueden favorecer su progreso. Además, las familias presentan distintos niveles de escolaridad y formas de acceso a la información. El docente busca una estrategia que fortalezca la comprensión del proceso de aprendizaje y promueva la corresponsabilidad. ¿Cuál sería la forma más pertinente de comunicar el progreso estudiantil?", options: ["Configurar un informe de progreso criterial con síntesis interpretativa, que articule descriptores de desempeño por indicador con evidencias seleccionadas del estudiante.", "Desarrollar un dispositivo de comunicación evaluativa dialógica y formativa, que integre niveles de logro con descriptores graduales, curaduría de evidencias significativas, y orientaciones diferenciadas para el apoyo en el hogar, habilitando además espacios estructurados de interacción donde familia y estudiante cointerpreteten los resultados y acuerden acciones de mejora contextualizadas.", "Implementar un reporte mixto de desempeño con anclaje normativo, en el que se combinen valoraciones cuantitativas estandarizadas por indicador con referencias comparativas.", "Diseñar una síntesis visual del progreso por competencias e indicadores, incorporando representaciones gráficas del nivel alcanzado y breves descripciones de los resultados."], correct: 1, justification: "La respuesta correcta es la B porque integra niveles de logro con descriptores graduales, evidencias significativas y orientaciones diferenciadas, además de espacios de interacción donde familia y estudiante interpreten juntos los resultados y acuerden acciones de mejora. Es la más completa para promover la corresponsabilidad. A es informativa pero no dialógica; C usa comparativas que pueden generar confusión; D es visual pero no promueve la interacción." },
                { id: 38, text: "En una clase de Ciencias Sociales del primer ciclo, la docente identifica que un estudiante presenta dificultades para comprender la secuencia temporal y el orden de los acontecimientos. Aunque sigue explicaciones guiadas, suele reproducir información de manera fragmentada y tiene problemas para relacionar hechos, construir líneas de tiempo o comparar períodos históricos. También presenta dificultades para transferir estas nociones a situaciones cotidianas. Las estrategias utilizadas se han basado principalmente en la exposición oral y en textos lineales. Considerando la necesidad de fortalecer el pensamiento relacional y la comprensión temporal, ¿qué apoyo pedagógico sería más adecuado?", options: ["Implementar estrategias de apoyo centradas en la adecuación del nivel de complejidad de las tareas y el ritmo de trabajo, ajustando la cantidad de información presentada.", "Implementar estrategias de apoyo centradas en la incorporación de recursos visuales, ejemplos contextualizados y actividades de aplicación guiada durante el desarrollo de las tareas, integrando líneas de tiempo, secuencias de imágenes, relatos cotidianos y ejercicios estructurados.", "Implementar estrategias de apoyo centradas en la construcción de nociones temporales a través de experiencias variadas y articuladas, integrando el uso sistemático de representaciones múltiples, la organización de secuencias significativas, la exploración de situaciones contextualizadas y espacios de verbalización que permitan establecer relaciones de anterioridad, simultaneidad y cambio, favoreciendo la comprensión y la transferencia a diferentes contextos.", "Implementar estrategias de apoyo centradas en la adecuación del nivel de las tareas, ajustando el tipo de representaciones temporales utilizadas."], correct: 2, justification: "La respuesta correcta es la C porque construye nociones temporales a través de representaciones múltiples, secuencias significativas, situaciones contextualizadas y verbalización, favoreciendo la comprensión y la transferencia. Es la estrategia más completa y profunda. A y D solo ajustan la complejidad; B incorpora recursos visuales útiles pero de manera menos sistemática que C." },
                { id: 39, text: "El docente observa que sus estudiantes utilizan con frecuencia expresiones propias del lenguaje cotidiano y de canciones populares en contextos académicos. Aunque reconoce el valor cultural de estas formas de expresión, identifica que pueden limitar la adecuación del registro lingüístico según la situación comunicativa. Su propósito es ampliar el repertorio lingüístico del grupo y promover el uso consciente de distintos registros sin desvalorizar sus formas de habla. Considerando la importancia de desarrollar la competencia comunicativa y la conciencia lingüística, ¿qué intervención pedagógica permitiría enriquecer el lenguaje oral y favorecer el uso pertinente de diferentes registros?", options: ["Promover una estrategia didáctica centrada en la incorporación de pautas, guías de escritura y de expresión oral, integrando momentos de planificación, producción y revisión con apoyo del docente, el uso de ejemplos, consignas estructuradas y espacios de retroalimentación para ajustar sus producciones, mejorar la coherencia y avanzar gradualmente en la mejora de la calidad de sus textos.", "Promover una estrategia didáctica centrada en la modelación de textos y discursos, proporcionando ejemplos estructurados, análisis guiados y actividades de reproducción que orienten a los estudiantes en el uso adecuado del vocabulario.", "Promover de manera progresiva una estrategia didáctica centrada en la producción frecuente de textos y discursos orales, incorporando ejercicios de práctica guiada, retroalimentación posterior y comparaciones entre distintos registros.", "Promover de manera progresiva una estrategia didáctica centrada en el acompañamiento de la construcción del discurso, integrando la planificación, la producción y la revisión mediante criterios compartidos y espacios de reflexión sobre las decisiones tomadas, de modo que los criterios compartidos orienten las decisiones."], correct: 3, justification: "La respuesta correcta es la D porque acompaña la construcción del discurso integrando planificación, producción y revisión con criterios compartidos y reflexión sobre las decisiones. Esto desarrolla la conciencia lingüística y la competencia comunicativa sin desvalorizar las formas de habla. A se centra en escritura sin trabajar la conciencia lingüística oral; B solo modela sin reflexión del estudiante; C practica pero sin profundizar en la reflexión sobre el registro." },
                { id: 40, text: "En una clase de Ciencias Sociales del primer ciclo, el docente identifica que un estudiante presenta dificultades para comprender la secuencia temporal. Las estrategias utilizadas se han basado principalmente en la exposición oral. El docente busca una estrategia de mediación pedagógica para reestructurar los formatos de presentación de la información y las consignas. ¿Cuál adaptación pedagógica sería más pertinente?", options: ["Implementar estrategias de apoyo centradas en la incorporación de recursos visuales, ejemplos contextualizados y actividades de aplicación guiada durante el desarrollo de las tareas.", "Implementar estrategias de mediación pedagógica centradas en la adecuación de la carga y el ritmo de las actividades, ajustando la cantidad de información.", "Implementar estrategias de mediación pedagógica centradas en incorporar apoyos complementarios durante el desarrollo de las actividades, integrando recursos visuales y ejemplos guiados.", "Implementar estrategias de mediación pedagógica centradas en la reestructuración de los formatos de presentación de la información y de las consignas, incorporando segmentación de instrucciones, apoyos visuales organizados, modelado explícito y recursos multimodales que faciliten la comprensión, la anticipación y la autonomía del estudiante en el desarrollo de las tareas propuestas."], correct: 3, justification: "La respuesta correcta es la D porque reestructura los formatos de presentación de manera integral: segmenta instrucciones, incorpora apoyos visuales organizados, modelado explícito y recursos multimodales. Esto favorece la comprensión, la anticipación y la autonomía. A incorpora recursos visuales pero sin la reestructuración completa del formato; B y C son más limitadas en su alcance." }
            ];

            const POINT_PER_QUESTION = TOTAL_POINTS / questions.length;
            const letterLabel = ['A','B','C','D'];

            function formatTime(seconds) {
                const m = Math.floor(seconds / 60);
                const s = seconds % 60;
                return `${String(m).padStart(2,'0')}:${String(s).padStart(2,'0')}`;
            }

            // ---------- React-like state -------------
            let state = {
                screen: 'start', // start | quiz | result
                current: 0,
                answers: Array(questions.length).fill(null),
                selected: null,
                revealed: false,
                timeLeft: TOTAL_TIME,
                flagged: Array(questions.length).fill(false),
                timerInterval: null
            };

            let root = document.getElementById('root');

            function render() {
                root.innerHTML = renderApp();
                attachEvents();
            }

            // ------------------------- render functions -------------------------
            function renderApp() {
                if (state.screen === 'start') return renderStart();
                if (state.screen === 'result') return renderResult();
                return renderQuiz();
            }

            function renderStart() {
                return `
                    <div class="start-container">
                        <div class="start-card">
                            <div style="font-size:48px; margin-bottom:12px;">📚</div>
                            <h1>Simulador de Evaluación Docente</h1>
                            <p class="sub">Sistema Educativo Dominicano · Competencias Pedagógicas</p>
                            <div class="info-box">
                                <div class="info-row"><span class="label">📋 Preguntas</span><span class="value">${questions.length} ítems de selección múltiple</span></div>
                                <div class="info-row"><span class="label">⏱️ Tiempo</span><span class="value">1 hora 30 minutos</span></div>
                                <div class="info-row"><span class="label">🏆 Puntaje total</span><span class="value">${TOTAL_POINTS} puntos</span></div>
                                <div class="info-row"><span class="label">💡 Modalidad</span><span class="value">Con justificación de respuestas</span></div>
                            </div>
                            <button class="btn-primary" data-action="start">Iniciar Simulador</button>
                        </div>
                    </div>
                `;
            }

            function renderQuiz() {
                const q = questions[state.current];
                const progress = ((state.current + 1) / questions.length) * 100;
                const totalAnswered = state.answers.filter(a => a !== null).length;
                const timerColor = state.timeLeft < 300 ? '#ef4444' : state.timeLeft < 900 ? '#f59e0b' : '#10b981';
                const isAnswered = state.answers[state.current] !== null;

                let optionsHtml = q.options.map((opt, oi) => {
                    let cls = 'opt-btn';
                    let letterCls = 'letter';
                    let icon = '';
                    if (state.revealed) {
                        if (oi === q.correct) {
                            cls += ' revealed-correct';
                            letterCls += ' correct';
                            icon = '✓';
                        } else if (oi === state.selected && oi !== q.correct) {
                            cls += ' revealed-wrong';
                            letterCls += ' wrong';
                            icon = '✗';
                        } else {
                            cls += ' neutral';
                        }
                    } else {
                        if (state.selected === oi) {
                            cls += ' selected';
                            letterCls += ' selected';
                        }
                    }
                    const letter = icon || letterLabel[oi];
                    return `
                        <div class="${cls}" data-optindex="${oi}">
                            <span class="${letterCls}">${letter}</span>
                            <span>${opt}</span>
                        </div>
                    `;
                }).join('');

                let justifyHtml = '';
                if (state.revealed) {
                    justifyHtml = `
                        <div class="justification-box">
                            <strong>💡 Justificación de la respuesta correcta:</strong>
                            <p>${q.justification}</p>
                        </div>
                    `;
                }

                let confirmBtn = '';
                if (!state.revealed) {
                    confirmBtn = `
                        <button class="btn-primary" data-action="confirm" ${state.selected === null ? 'disabled' : ''}>
                            Confirmar respuesta
                        </button>
                    `;
                }

                const isLast = state.current === questions.length - 1;
                const nextLabel = isLast ? 'Finalizar evaluación ✓' : 'Siguiente →';
                const nextAction = isLast ? 'finish' : 'next';
                const nextClass = isLast ? 'finish' : 'next';

                return `
                    <div class="header">
                        <div class="header-inner">
                            <div class="item-id">Ítem ${state.current + 1}<span> / ${questions.length}</span></div>
                            <div class="timer" style="background:${timerColor}">⏱ ${formatTime(state.timeLeft)}</div>
                            <div class="answered">${totalAnswered}/${questions.length} respondidas</div>
                        </div>
                        <div class="progress-bar"><div class="progress-fill" style="width:${progress}%"></div></div>
                    </div>
                    <div class="app">
                        <div class="nav-grid">
                            ${questions.map((_, i) => {
                                const ans = state.answers[i];
                                let cls = 'nav-btn';
                                if (i === state.current) cls += ' current';
                                if (state.flagged[i]) cls += ' flagged';
                                if (ans !== null) {
                                    const correct = ans === questions[i].correct;
                                    cls += correct ? ' answered-correct' : ' answered-wrong';
                                }
                                return `<button class="${cls}" data-nav="${i}">${i+1}</button>`;
                            }).join('')}
                        </div>
                        <div class="q-card">
                            <div class="q-header">
                                <span class="q-badge">Ítem ${q.id} de ${questions.length}</span>
                                <button class="flag-btn ${state.flagged[state.current] ? 'active' : ''}" data-action="flag">${state.flagged[state.current] ? '🚩 Marcada' : '⚑ Marcar'}</button>
                            </div>
                            <div class="q-text">${q.text}</div>
                            ${optionsHtml}
                            ${confirmBtn}
                            ${justifyHtml}
                        </div>
                        <div class="nav-actions">
                            <button class="prev" data-action="prev" ${state.current === 0 ? 'disabled' : ''}>← Anterior</button>
                            <button class="${nextClass}" data-action="${nextAction}">${nextLabel}</button>
                        </div>
                    </div>
                `;
            }

            function renderResult() {
                const score = state.answers.reduce((acc, ans, i) => {
                    if (ans === questions[i].correct) return acc + POINT_PER_QUESTION;
                    return acc;
                }, 0);
                const scoreRounded = Math.round(score * 100) / 100;
                const pct = (scoreRounded / TOTAL_POINTS) * 100;
                const passed = scoreRounded >= 14;
                const correctCount = state.answers.filter((a, i) => a === questions[i].correct).length;

                let itemsHtml = questions.map((q, i) => {
                    const userAns = state.answers[i];
                    const isCorrect = userAns === q.correct;
                    const unanswered = userAns === null;
                    let cls = 'review-item';
                    if (unanswered) cls += ' unanswered';
                    else if (isCorrect) cls += ' correct';
                    else cls += ' wrong';

                    let tag = '';
                    if (unanswered) tag = '<span class="tag unanswered">Sin responder</span>';
                    else if (isCorrect) tag = '<span class="tag correct">✓ Correcto</span>';
                    else tag = '<span class="tag wrong">✗ Incorrecto</span>';

                    const optHtml = q.options.map((opt, oi) => {
                        let cls2 = 'review-opt neutral';
                        let lbl = letterLabel[oi];
                        if (oi === q.correct) { cls2 = 'review-opt right'; lbl += ' ✓'; }
                        if (oi === userAns && !isCorrect) { cls2 = 'review-opt wrong'; lbl += ' ✗'; }
                        return `<div class="${cls2}"><span class="lbl">${lbl}.</span><span>${opt}</span></div>`;
                    }).join('');

                    return `
                        <div class="${cls}">
                            <div class="row">
                                <span class="qid">Ítem ${q.id}</span>
                                ${tag}
                            </div>
                            <div class="qtext">${q.text}</div>
                            ${optHtml}
                            <div class="review-just">
                                <strong>💡 Justificación: </strong>
                                <span>${q.justification}</span>
                            </div>
                        </div>
                    `;
                }).join('');

                return `
                    <div class="result-container">
                        <div class="result-card">
                            <div style="font-size:56px; margin-bottom:8px;">${passed ? '🎉' : '📝'}</div>
                            <h2>${passed ? '¡Evaluación aprobada!' : 'Evaluación completada'}</h2>
                            <p class="sub">${passed ? 'Superaste el umbral de aprobación (14/20)' : 'No alcanzaste el umbral mínimo de aprobación'}</p>
                            <div class="score-box ${passed ? '' : 'fail'}">
                                <div class="big ${passed ? 'pass' : 'fail'}">${scoreRounded.toFixed(2)}</div>
                                <div class="label">puntos de ${TOTAL_POINTS}</div>
                                <div class="score-bar"><div class="fill" style="width:${pct}%; background:${passed ? '#10b981' : '#ef4444'}"></div></div>
                                <div class="label">${correctCount} de ${questions.length} respuestas correctas</div>
                            </div>
                            <button class="restart-btn" data-action="restart">Volver a intentar</button>
                        </div>
                        <div class="review-title">Revisión detallada de respuestas</div>
                        ${itemsHtml}
                    </div>
                `;
            }

            // ------------------------- event handling -------------------------
            function attachEvents() {
                // start
                document.querySelectorAll('[data-action="start"]').forEach(el => {
                    el.onclick = () => startQuiz();
                });
                // quiz: nav
                document.querySelectorAll('[data-nav]').forEach(el => {
                    el.onclick = () => {
                        const idx = parseInt(el.dataset.nav, 10);
                        goTo(idx);
                    };
                });
                // quiz: flag
                document.querySelectorAll('[data-action="flag"]').forEach(el => {
                    el.onclick = () => toggleFlag();
                });
                // quiz: confirm
                document.querySelectorAll('[data-action="confirm"]').forEach(el => {
                    el.onclick = () => confirmAnswer();
                });
                // quiz: prev
                document.querySelectorAll('[data-action="prev"]').forEach(el => {
                    el.onclick = () => prevQuestion();
                });
                // quiz: next
                document.querySelectorAll('[data-action="next"]').forEach(el => {
                    el.onclick = () => nextQuestion();
                });
                // quiz: finish
                document.querySelectorAll('[data-action="finish"]').forEach(el => {
                    el.onclick = () => finishQuiz();
                });
                // result: restart
                document.querySelectorAll('[data-action="restart"]').forEach(el => {
                    el.onclick = () => restart();
                });
                // option selection
                document.querySelectorAll('.opt-btn').forEach(el => {
                    el.onclick = () => {
                        if (state.revealed) return;
                        const idx = parseInt(el.dataset.optindex, 10);
                        selectOption(idx);
                    };
                });
            }

            // ------------------------- actions -------------------------
            function startQuiz() {
                clearInterval(state.timerInterval);
                state.screen = 'quiz';
                state.current = 0;
                state.answers = Array(questions.length).fill(null);
                state.flagged = Array(questions.length).fill(false);
                state.selected = null;
                state.revealed = false;
                state.timeLeft = TOTAL_TIME;
                render();
                state.timerInterval = setInterval(() => {
                    state.timeLeft -= 1;
                    if (state.timeLeft <= 0) {
                        clearInterval(state.timerInterval);
                        state.screen = 'result';
                        render();
                    } else {
                        render(); // re-render to update timer
                    }
                }, 1000);
            }

            function goTo(idx) {
                state.current = idx;
                state.selected = state.answers[idx];
                state.revealed = state.answers[idx] !== null;
                render();
            }

            function selectOption(idx) {
                if (state.revealed) return;
                state.selected = idx;
                render();
            }

            function confirmAnswer() {
                if (state.selected === null) return;
                const newAnswers = [...state.answers];
                newAnswers[state.current] = state.selected;
                state.answers = newAnswers;
                state.revealed = true;
                render();
            }

            function toggleFlag() {
                const f = [...state.flagged];
                f[state.current] = !f[state.current];
                state.flagged = f;
                render();
            }

            function prevQuestion() {
                if (state.current > 0) {
                    goTo(state.current - 1);
                }
            }

            function nextQuestion() {
                if (state.current < questions.length - 1) {
                    goTo(state.current + 1);
                }
            }

            function finishQuiz() {
                clearInterval(state.timerInterval);
                state.screen = 'result';
                render();
            }

            function restart() {
                clearInterval(state.timerInterval);
                state.screen = 'start';
                render();
            }

            // initial render
            render();
        })();
		})
    </script>
</body>
</html>
